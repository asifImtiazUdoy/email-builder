kind = "web"
previewPath = "/velour-email/"
title = "Velour Active Email"
version = "1.0.0"
id = "artifacts/velour-email"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/velour-email/" ]
localPort = 19428

[services.development]
run = "pnpm --filter @workspace/velour-email run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/velour-email", "run", "build" ]
publicDir = "artifacts/velour-email/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19428"
BASE_PATH = "/velour-email/"
